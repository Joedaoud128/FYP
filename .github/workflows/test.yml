name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  # Job 1: Fast tests (unit + integration, no Docker/LLM)
  fast-tests:
    name: Fast Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-cov flake8 mypy

      - name: Lint with flake8
        run: |
          # Syntax errors only (fail build)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,.venv,__pycache__ --ignore=F824 || exit 1
          # Style warnings (don't fail)
          flake8 . --count --max-line-length=100 --statistics \
            --exclude=venv,.venv,__pycache__ --exit-zero

      - name: Run unit and integration tests
        run: |
          export PYTHONPATH=src:$PYTHONPATH
          pytest tests/unit tests/integration \
            -v \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            -m "not system" \
            --ignore=tests/system

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Job 2: Docker security tests (requires Docker)
  docker-tests:
    name: Docker Security Tests
    runs-on: ubuntu-latest
    needs: fast-tests  # Run after fast tests
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          # Add docker path for imports
          echo "PYTHONPATH=docker:$PYTHONPATH" >> $GITHUB_ENV

      - name: Build Docker sandbox image
        run: |
          docker build -t agent-sandbox -f docker/Dockerfile .

      - name: Run Docker sandbox tests
        run: |
          pytest tests/system/test_docker_sandbox.py -v -m system
        env:
          PYTHONPATH: docker:${{ env.PYTHONPATH }}

  # Job 3: Guardrails integration tests (fast, no Docker)
  guardrails-tests:
    name: Guardrails Integration Tests
    runs-on: ubuntu-latest
    needs: fast-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Run guardrails integration tests
        run: |
          export PYTHONPATH=src:$PYTHONPATH
          pytest tests/integration/test_guardrails_integration.py -v

  # Job 4: Generate mode tests (LLM-dependent, optional)
  generate-tests:
    name: Generate Mode Tests
    runs-on: ubuntu-latest
    needs: fast-tests
    # Only run on demand (not in CI by default to save time/cost)
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest

      - name: Setup Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen3:8b

      - name: Run generate mode tests
        run: |
          export PYTHONPATH=src:$PYTHONPATH
          pytest tests/system/test_cli_generate_mode.py -v -m system

  # Job 5: Full system tests (fix mode, requires LLM)
  fix-tests:
    name: Fix Mode Tests
    runs-on: ubuntu-latest
    needs: fast-tests
    if: github.event_name == 'workflow_dispatch'  # Manual trigger only

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest

      - name: Setup Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen3:8b

      - name: Build Docker image
        run: |
          docker build -t agent-sandbox -f docker/Dockerfile .

      - name: Run fix mode tests
        run: |
          export PYTHONPATH=src:$PYTHONPATH
          pytest tests/system/test_cli_fix_mode.py -v -m system