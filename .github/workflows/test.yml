name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          
          # Install test requirements (if exists)
          if [ -f requirements-test.txt ]; then
            pip install -r requirements-test.txt
          fi
          
          # Ensure pytest-cov is installed (for coverage)
          pip install pytest-cov

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=venv,.venv,__pycache__
          # Warn on style issues but don't fail
          flake8 . --count --max-line-length=100 --statistics \
            --exclude=venv,.venv,__pycache__ --exit-zero

      - name: Run unit and integration tests (no Docker, no LLM)
        run: |
          export PYTHONPATH=src:$PYTHONPATH
          pytest tests/unit tests/integration \
            -v \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            -m "not system" \
            --ignore=tests/system

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
