[pytest]
# ── Discovery ──────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ─────────────────────────────────────────────────────────────────────
# -v  : verbose (show each test name)
# -s  : don't capture stdout (useful when debugging a single test)
# --tb=short : short traceback on failure (easier to read than full)
addopts = -v --tb=short

# ── Markers ────────────────────────────────────────────────────────────────────
# Register custom markers so pytest doesn't emit PytestUnknownMarkWarning.
# Use -m "not docker" to skip system-level tests in CI.
markers =
    unit: Pure-Python tests with no external services required
    integration: Tests that wire multiple modules together (no LLM/Docker)
    system: End-to-end tests that require a running Docker daemon
    slow: Tests that take more than a few seconds

# ── Minimum Python version ─────────────────────────────────────────────────────
minversion = 7.4
